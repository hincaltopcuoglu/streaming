apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: clickstream
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: clickstream-api:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: JAVA_HOME
          value: ""
        envFrom:
        - configMapRef:
            name: clickstream-config
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi