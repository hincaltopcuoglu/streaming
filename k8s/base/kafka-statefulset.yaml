apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-config
  namespace: clickstream
data:
  CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
  server.properties: |
    # Apache Kafka 3.7 KRaft mode — minimal production-ready config
    process.roles=broker,controller
    node.id=1
    controller.quorum.voters=1@kafka-0.kafka-headless.clickstream.svc.cluster.local:9093
    listeners=PLAINTEXT://:9092,CONTROLLER://:9093
    advertised.listeners=PLAINTEXT://kafka:9092
    listener.security.protocol.map=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
    controller.listener.names=CONTROLLER
    inter.broker.listener.name=PLAINTEXT
    log.dirs=/var/lib/kafka/data
    offsets.topic.replication.factor=1
    transaction.state.log.replication.factor=1
    transaction.state.log.min.isr=1
    auto.create.topics.enable=true
    group.initial.rebalance.delay.ms=0
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: clickstream
spec:
  clusterIP: None
  selector:
    app: kafka
  ports:
  - name: broker
    port: 9092
    targetPort: 9092
  - name: controller
    port: 9093
    targetPort: 9093
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: clickstream
spec:
  selector:
    app: kafka
  ports:
  - port: 9092
    targetPort: 9092
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: clickstream
spec:
  serviceName: kafka-headless
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      # fsGroup + runAsUser: Apache Kafka default uid 1000 ile persistent volume'a yazabilsin
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: kafka
        image: apache/kafka:3.7.1
        ports:
        - containerPort: 9092
          name: broker
        - containerPort: 9093
          name: controller
        env:
        - name: CLUSTER_ID
          valueFrom:
            configMapKeyRef:
              name: kafka-config
              key: CLUSTER_ID
        command: ["/bin/sh", "-c"]
        args:
        - |
          set -e
          # Format storage on first boot (idempotent)
          if [ ! -f /var/lib/kafka/data/meta.properties ]; then
            echo "[bootstrap] Formatting KRaft storage with cluster-id $CLUSTER_ID"
            /opt/kafka/bin/kafka-storage.sh format -t $CLUSTER_ID -c /etc/kafka-config/server.properties
          else
            echo "[bootstrap] Storage already formatted"
          fi
          exec /opt/kafka/bin/kafka-server-start.sh /etc/kafka-config/server.properties
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 1
            memory: 2Gi
        readinessProbe:
          tcpSocket:
            port: 9092
          initialDelaySeconds: 10
          periodSeconds: 5
        volumeMounts:
        - name: data
          mountPath: /var/lib/kafka/data
        - name: kafka-config
          mountPath: /etc/kafka-config
      volumes:
      - name: kafka-config
        configMap:
          name: kafka-config
          items:
          - key: server.properties
            path: server.properties
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 2Gi