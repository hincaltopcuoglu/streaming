apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: clickstream

resources:
  # Önce altyapı (Redis, Kafka), sonra uygulamalar (API, Spark)
  - namespace.yaml
  - configmap.yaml
  - kafka-statefulset.yaml      # ConfigMap + 2 Service + StatefulSet, hepsi içinde
  - redis-deployment.yaml
  - redis-service.yaml
  - api-deployment.yaml
  - api-service.yaml
  - spark-deployment.yaml